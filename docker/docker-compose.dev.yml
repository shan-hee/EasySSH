services:
  easyssh:
    build:
      context: ..
      dockerfile: Dockerfile
    image: easyssh:dev
    container_name: easyssh-dev
    restart: unless-stopped
    ports:
      - "8520:8520"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8520}
      WEB_PORT: ${WEB_PORT:-3000}
      ENV: ${ENV:-development}

      DB_DRIVER: ${DB_DRIVER:-sqlite}
      DB_DSN: ${DB_DSN:-/app/data/easyssh.db}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-10}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-100}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-60}
      DB_CONN_MAX_IDLE_TIME: ${DB_CONN_MAX_IDLE_TIME:-10}

      JWT_SECRET: ${JWT_SECRET:-easyssh-secret-change-in-development}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-ZWFzeXNzaC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzISE=}

      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}

      CONTENT_SECURITY_POLICY: ${CONTENT_SECURITY_POLICY:-}
      VITE_WS_HOST: ${VITE_WS_HOST:-}
    volumes:
      - ./data-dev:/app/data
    networks:
      - easyssh-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8520/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  easyssh-network:
    name: easyssh-network-dev
    driver: bridge
