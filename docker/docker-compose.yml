services:
  easyssh:
    image: shanhee/easyssh:latest
    container_name: easyssh
    restart: unless-stopped
    ports:
      - "8520:8520"
    environment:
      DB_DRIVER: ${DB_DRIVER:-sqlite}
      DB_DSN: ${DB_DSN:-/app/data/easyssh.db}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    volumes:
      - ./data:/app/data
    networks:
      - easyssh-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8520/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  easyssh-network:
    name: easyssh-network
    driver: bridge
