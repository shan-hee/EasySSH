name: Build EasySSH Docker Image

# Docker 镜像构建：
#   - 正式发版由 release.yml (tag 触发) 调用本 workflow
#   - workflow_dispatch 保留为紧急重建镜像的手动入口
on:
  workflow_call:
    inputs:
      version:
        description: '镜像版本号 (不含 v 前缀)'
        required: true
        type: string
      platforms:
        description: '构建平台'
        required: false
        type: string
        default: 'linux/amd64'
      update-latest:
        description: '是否更新 latest 标签'
        required: false
        type: boolean
        default: true
    outputs:
      digest:
        description: '已扫描并发布的多架构镜像摘要'
        value: ${{ jobs.build.outputs.digest }}

  workflow_dispatch:
    inputs:
      version:
        description: 'Version. Leave empty to read VERSION file.'
        required: false
        type: string
      update-latest:
        description: 'Update the Docker latest tag'
        required: true
        type: boolean
        default: true
      platforms:
        description: 'Docker build platforms'
        required: true
        type: choice
        default: 'linux/amd64'
        options:
          - 'linux/amd64'
          - 'linux/amd64,linux/arm64'
          - 'linux/arm64'

env:
  DOCKER_IMAGE: shanhee/easyssh

jobs:
  build:
    name: 🐳 Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📖 解析版本号
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version || '' }}
        run: |
          if [ -n "$VERSION_INPUT" ]; then
            VERSION="$VERSION_INPUT"
            echo "使用传入的版本号: $VERSION"
          elif [ -f "VERSION" ]; then
            VERSION=$(tr -d '[:space:]' < VERSION)
            echo "使用 VERSION 文件中的版本号: $VERSION"
          else
            echo "::error::未提供版本号且 VERSION 文件不存在"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_image=${DOCKER_IMAGE}:build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=v${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ inputs['update-latest'] }}

      - name: Setup QEMU
        if: contains(inputs.platforms, 'arm64')
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: shanhee
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ 构建并推送待扫描镜像
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.version.outputs.staging_image }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max

      - name: 🔍 Trivy 扫描 amd64 (生成报告)
        if: contains(inputs.platforms, 'linux/amd64')
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_PLATFORM: linux/amd64
        with:
          image-ref: ${{ steps.version.outputs.staging_image }}@${{ steps.build.outputs.digest }}
          format: 'sarif'
          output: 'trivy-results-amd64.sarif'
          severity: 'CRITICAL,HIGH'
          limit-severities-for-sarif: true

      - name: Upload amd64 Trivy results to GitHub Security
        if: contains(inputs.platforms, 'linux/amd64')
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results-amd64.sarif'
          category: 'trivy-linux-amd64'

      - name: 🚧 Trivy amd64 安全关卡
        if: contains(inputs.platforms, 'linux/amd64')
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_PLATFORM: linux/amd64
        with:
          image-ref: ${{ steps.version.outputs.staging_image }}@${{ steps.build.outputs.digest }}
          format: 'table'
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1'

      - name: 🔍 Trivy 扫描 arm64 (生成报告)
        if: contains(inputs.platforms, 'linux/arm64')
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_PLATFORM: linux/arm64
        with:
          image-ref: ${{ steps.version.outputs.staging_image }}@${{ steps.build.outputs.digest }}
          format: 'sarif'
          output: 'trivy-results-arm64.sarif'
          severity: 'CRITICAL,HIGH'
          limit-severities-for-sarif: true

      - name: Upload arm64 Trivy results to GitHub Security
        if: contains(inputs.platforms, 'linux/arm64')
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results-arm64.sarif'
          category: 'trivy-linux-arm64'

      - name: 🚧 Trivy arm64 安全关卡
        if: contains(inputs.platforms, 'linux/arm64')
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_PLATFORM: linux/arm64
        with:
          image-ref: ${{ steps.version.outputs.staging_image }}@${{ steps.build.outputs.digest }}
          format: 'table'
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1'

      - name: 🚀 提升已扫描镜像为正式标签
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          STAGING_IMAGE: ${{ steps.version.outputs.staging_image }}
        run: |
          set -euo pipefail

          TAG_ARGS=()
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              TAG_ARGS+=(--tag "$tag")
            fi
          done <<< "$IMAGE_TAGS"

          if [ ${#TAG_ARGS[@]} -eq 0 ]; then
            echo "::error::未生成任何正式镜像标签"
            exit 1
          fi

          docker buildx imagetools create \
            "${TAG_ARGS[@]}" \
            "${STAGING_IMAGE}@${IMAGE_DIGEST}"

      - name: 📊 生成构建摘要
        run: |
          echo "## 🐳 EasySSH Docker 镜像构建成功" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**镜像标签:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "shanhee/easyssh:v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs['update-latest'] }}" = "true" ]; then
            echo "shanhee/easyssh:latest" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**支持架构:** ${{ inputs.platforms }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**镜像摘要:** \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 🚀 快速启动" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull shanhee/easyssh:v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
