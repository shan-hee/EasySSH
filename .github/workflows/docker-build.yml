name: Build EasySSH Artifacts

on:
  push:
    branches: [main]
    paths:
      - 'VERSION'
      - 'Dockerfile'
      - '.github/workflows/docker-build.yml'

  workflow_dispatch:
    inputs:
      version:
        description: 'Version. Leave empty to read VERSION file.'
        required: false
        type: string
      update-latest:
        description: 'Update the Docker latest tag'
        required: true
        type: boolean
        default: true
      platforms:
        description: 'Docker build platforms'
        required: true
        type: choice
        default: 'linux/amd64'
        options:
          - 'linux/amd64'
          - 'linux/amd64,linux/arm64'
          - 'linux/arm64'
      build-desktop:
        description: 'Build the desktop artifact'
        required: true
        type: boolean
        default: true
      desktop-target:
        description: 'Desktop build target'
        required: true
        type: choice
        default: 'windows-x86'
        options:
          - 'windows-x86'
          - 'windows-amd64'

env:
  DOCKER_IMAGE: shanhee/easyssh
  PLATFORMS: linux/amd64

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        env:
          VERSION_INPUT: ${{ github.event.inputs.version || '' }}
        run: |
          if [ -n "$VERSION_INPUT" ]; then
            VERSION="$VERSION_INPUT"
            echo "Using workflow input version: $VERSION"
          elif [ -f "VERSION" ]; then
            VERSION=$(tr -d '[:space:]' < VERSION)
            echo "Using VERSION file: $VERSION"
          else
            VERSION="dev"
            echo "VERSION file was not found. Using default version: dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs['update-latest'] == 'true' }}
            type=raw,value=v${{ steps.version.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=v${{ steps.version.outputs.version }},enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: shanhee
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push EasySSH Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ github.event.inputs.platforms || env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Run Trivy security scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate Docker summary
        run: |
          echo "## EasySSH Docker image build succeeded" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "shanhee/easyssh:latest" >> "$GITHUB_STEP_SUMMARY"
          echo "shanhee/easyssh:v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Platforms:** ${{ github.event.inputs.platforms || env.PLATFORMS }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Quick start" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull shanhee/easyssh:latest" >> "$GITHUB_STEP_SUMMARY"
          echo "cd EasySSH" >> "$GITHUB_STEP_SUMMARY"
          echo "docker compose up -d" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Image info" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Contains:** Go backend + Next.js static files" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Platforms:** ${{ github.event.inputs.platforms || env.PLATFORMS }}" >> "$GITHUB_STEP_SUMMARY"

  desktop-windows:
    name: Build EasySSH Desktop Windows
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs['build-desktop'] == 'true' }}
    runs-on: windows-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
        working-directory: desktop/EasySSHDesktop

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: desktop/EasySSHDesktop/go.mod
          cache-dependency-path: desktop/EasySSHDesktop/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.3 --activate

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.97
          $goBin = Join-Path (go env GOPATH) 'bin'
          $goBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Resolve desktop target
        id: desktop
        run: |
          $target = "${{ github.event.inputs['desktop-target'] || 'windows-x86' }}"
          switch ($target) {
            'windows-x86' { $arch = 'x86' }
            'windows-amd64' { $arch = 'amd64' }
            default { throw "Unsupported desktop target: $target" }
          }
          "target=$target" >> $env:GITHUB_OUTPUT
          "arch=$arch" >> $env:GITHUB_OUTPUT

      - name: Build desktop app
        run: wails3 task windows:build ARCH=${{ steps.desktop.outputs.arch }}

      - name: Package desktop artifact
        id: package
        env:
          VERSION_INPUT: ${{ github.event.inputs.version || '' }}
        run: |
          $version = $env:VERSION_INPUT
          if ([string]::IsNullOrWhiteSpace($version) -and (Test-Path ..\..\VERSION)) {
            $version = (Get-Content ..\..\VERSION -Raw).Trim()
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = 'dev'
          }

          $target = "${{ steps.desktop.outputs.target }}"
          $artifactBase = "easysshdesktop-$target-v$version"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -Path bin\easysshdesktop.exe -Destination "dist\$artifactBase.exe" -Force
          Compress-Archive -Path "dist\$artifactBase.exe" -DestinationPath "dist\$artifactBase.zip" -Force

          "version=$version" >> $env:GITHUB_OUTPUT
          "artifact=$artifactBase.zip" >> $env:GITHUB_OUTPUT

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyssh-desktop-${{ steps.desktop.outputs.target }}
          path: desktop/EasySSHDesktop/dist/*.zip
          if-no-files-found: error

      - name: Generate desktop summary
        run: |
          "## EasySSH Desktop artifact" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "- **Target:** ${{ steps.desktop.outputs.target }}" >> $env:GITHUB_STEP_SUMMARY
          "- **Arch:** ${{ steps.desktop.outputs.arch }}" >> $env:GITHUB_STEP_SUMMARY
          "- **Version:** v${{ steps.package.outputs.version }}" >> $env:GITHUB_STEP_SUMMARY
          "- **Artifact:** ${{ steps.package.outputs.artifact }}" >> $env:GITHUB_STEP_SUMMARY
