name: Build EasySSH Docker Image

# Docker 镜像构建：
#   - 正式发版由 release.yml (tag 触发) 调用本 workflow
#   - workflow_dispatch 保留为紧急重建镜像的手动入口
on:
  workflow_call:
    inputs:
      version:
        description: '镜像版本号 (不含 v 前缀)'
        required: true
        type: string
      platforms:
        description: '构建平台'
        required: false
        type: string
        default: 'linux/amd64'
      update-latest:
        description: '是否更新 latest 标签'
        required: false
        type: boolean
        default: true

  workflow_dispatch:
    inputs:
      version:
        description: 'Version. Leave empty to read VERSION file.'
        required: false
        type: string
      update-latest:
        description: 'Update the Docker latest tag'
        required: true
        type: boolean
        default: true
      platforms:
        description: 'Docker build platforms'
        required: true
        type: choice
        default: 'linux/amd64'
        options:
          - 'linux/amd64'
          - 'linux/amd64,linux/arm64'
          - 'linux/arm64'

env:
  DOCKER_IMAGE: shanhee/easyssh

jobs:
  build:
    name: 🐳 Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📖 解析版本号
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version || '' }}
        run: |
          if [ -n "$VERSION_INPUT" ]; then
            VERSION="$VERSION_INPUT"
            echo "使用传入的版本号: $VERSION"
          elif [ -f "VERSION" ]; then
            VERSION=$(tr -d '[:space:]' < VERSION)
            echo "使用 VERSION 文件中的版本号: $VERSION"
          else
            echo "::error::未提供版本号且 VERSION 文件不存在"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=v${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ inputs['update-latest'] }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: shanhee
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ 构建镜像 (本地, 用于安全扫描)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:scan
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔍 Trivy 扫描 (生成报告)
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: 🚧 Trivy 安全关卡 (存在可修复的 CRITICAL 漏洞则终止发布)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:scan
          format: 'table'
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1'

      - name: 🏗️ 构建并推送多架构镜像
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: 📊 生成构建摘要
        run: |
          echo "## 🐳 EasySSH Docker 镜像构建成功" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**镜像标签:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "shanhee/easyssh:v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs['update-latest'] }}" = "true" ]; then
            echo "shanhee/easyssh:latest" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**支持架构:** ${{ inputs.platforms }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**镜像摘要:** \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 🚀 快速启动" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull shanhee/easyssh:v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
