name: Build EasySSH Desktop

# 桌面端构建（Wails v3, Windows 交叉编译）：
#   - 由 release.yml (tag 触发) 调用，默认构建 Windows amd64
#   - workflow_dispatch 可手动选择架构，产物以 artifact 形式上传
on:
  workflow_call:
    inputs:
      arch:
        description: 'Windows 架构 (amd64 / arm64)'
        required: false
        type: string
        default: 'amd64'

  workflow_dispatch:
    inputs:
      arch:
        description: 'Windows 架构'
        required: true
        type: choice
        default: 'amd64'
        options:
          - 'amd64'
          - 'arm64'

jobs:
  build:
    name: 💻 Windows ${{ inputs.arch }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/EasySSHDesktop
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      # wails3 generate bindings 按宿主 (Linux) 平台分析 Go 代码，需要 gtk/webkit 头文件，
      # 即使最终构建目标是 Windows
      - name: 🔧 安装 Linux 系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-4-dev libwebkitgtk-6.0-dev

      - name: 🔧 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: desktop/EasySSHDesktop/go.mod
          cache-dependency-path: desktop/EasySSHDesktop/go.sum

      # 桌面端前端与共享 web workspace 统一使用 pnpm
      - name: 🔧 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            web/pnpm-lock.yaml
            desktop/EasySSHDesktop/frontend/pnpm-lock.yaml

      - name: 🔧 安装 wails3 CLI (与 go.mod 版本一致)
        run: |
          WAILS_VERSION=$(go list -m -f '{{.Version}}' github.com/wailsapp/wails/v3)
          echo "安装 wails3 $WAILS_VERSION"
          go install "github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}"

      - name: 🏗️ 构建 Windows 应用 (CGO=0 交叉编译)
        run: wails3 task windows:build ARCH=${{ inputs.arch }}

      - name: 📦 打包桌面端 zip
        id: artifact
        run: |
          PACKAGE_NAME="EasySSH-windows-${{ inputs.arch }}-desktop"
          ZIP_NAME="${PACKAGE_NAME}.zip"

          rm -rf "bin/${ZIP_NAME}"

          cd bin
          zip "$ZIP_NAME" EasySSH.exe

          echo "artifact_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: 📤 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: desktop/EasySSHDesktop/bin/${{ steps.artifact.outputs.zip_name }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

      - name: 📊 生成构建摘要
        run: |
          echo "## 💻 EasySSH Desktop 构建成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **平台:** Windows (${{ inputs.arch }})" >> $GITHUB_STEP_SUMMARY
