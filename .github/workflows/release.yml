name: Release

# 发版唯一入口：推送 v* 标签
# 流程：版本校验 → 镜像 (linux/amd64) + 桌面端 (Windows amd64) → 创建 GitHub Release
# 注：测试在本地完成后再发版，流水线不跑 CI；
#     需要其他架构时在 Actions 页面手动运行 docker-build / desktop-build 并选择平台
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 1. 校验 tag 与 VERSION 文件一致，保证版本号单一来源
  validate:
    name: ✅ 版本校验
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔎 校验 tag 与 VERSION 文件一致
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)

          echo "Tag 版本: $TAG_VERSION"
          echo "VERSION 文件版本: $FILE_VERSION"

          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::tag ($GITHUB_REF_NAME) 与 VERSION 文件 ($FILE_VERSION) 不一致。请先运行 ./scripts/bump-version.sh $TAG_VERSION 更新版本号后再打 tag。"
            exit 1
          fi

          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT

  # 2. 构建并推送 Docker 镜像（内部含 Trivy 安全关卡，扫描不通过不会推送）
  docker:
    name: 🐳 镜像
    needs: validate
    uses: ./.github/workflows/docker-build.yml
    with:
      version: ${{ needs.validate.outputs.version }}
      platforms: 'linux/amd64'
      update-latest: true
    secrets: inherit
    permissions:
      contents: read
      security-events: write
      actions: read

  # 3. 构建 Windows 桌面端 (默认 amd64)
  desktop:
    name: 💻 桌面端
    needs: validate
    uses: ./.github/workflows/desktop-build.yml
    with:
      arch: 'amd64'
    permissions:
      contents: read

  # 4. 全部成功后创建 GitHub Release
  release:
    name: 🎉 创建 Release
    needs: [validate, docker, desktop]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📝 生成 Release Notes
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "$CURRENT_TAG^" 2>/dev/null || echo "")

          echo "当前标签: $CURRENT_TAG"
          echo "前一个标签: $PREVIOUS_TAG"

          if [ -z "$PREVIOUS_TAG" ]; then
            RANGE=""
          else
            RANGE="$PREVIOUS_TAG..$CURRENT_TAG"
          fi

          # 按 conventional commits 前缀分类输出一节变更日志
          section() {
            local title="$1" pattern="$2"
            local lines
            lines=$(git log $RANGE --pretty=format:"%s (%h)" --no-merges | \
              grep -iE "$pattern" | sed -E 's/^[a-zA-Z]+(\([^)]*\))?!?: */- /' || true)
            if [ -n "$lines" ]; then
              echo "### $title"
              echo "$lines"
              echo ""
            fi
          }

          {
            echo "## 🚀 更新内容"
            echo ""
            section "✨ 新功能" '^(feat|feature)(\(|!|:)'
            section "🐛 Bug 修复" '^(fix|bugfix)(\(|!|:)'
            section "♻️ 代码重构" '^refactor(\(|!|:)'
            section "⚡ 性能优化" '^perf(\(|!|:)'
            section "🎨 样式优化" '^(style|ui)(\(|!|:)'
            section "📚 文档更新" '^docs?(\(|!|:)'
            echo "---"
            echo ""
            echo "## 🐳 Docker 镜像"
            echo ""
            echo '```bash'
            echo "docker pull shanhee/easyssh:$CURRENT_TAG"
            echo "docker pull shanhee/easyssh:latest"
            echo '```'
            echo ""
            echo "**支持架构:** \`linux/amd64\`（需要 arm64 时在 Actions 页面手动运行 Build EasySSH Docker Image 选择平台）"
            echo ""
            echo "## 💻 桌面端"
            echo ""
            echo "Windows (amd64) 客户端见下方 Assets: \`EasySSH-windows-amd64-desktop.zip\`"
            echo ""
            echo "## 📦 快速部署"
            echo ""
            echo '```bash'
            echo "# 下载 docker-compose.yml"
            echo "wget https://raw.githubusercontent.com/shan-hee/EasySSH/$CURRENT_TAG/docker/docker-compose.yml"
            echo ""
            echo "# 按需修改配置后启动"
            echo "docker compose up -d"
            echo '```'
            echo ""
            echo "## 🔒 安全"
            echo ""
            echo "镜像已通过 Trivy 安全扫描（存在可修复的 CRITICAL 漏洞时会阻断发布）。详见 [Security](https://github.com/shan-hee/EasySSH/security) 标签页。"
            echo ""
            echo "---"
            echo ""
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "**完整更新日志:** [\`$PREVIOUS_TAG...$CURRENT_TAG\`](https://github.com/shan-hee/EasySSH/compare/$PREVIOUS_TAG...$CURRENT_TAG)"
            fi
          } > release_notes.md

          cat release_notes.md

      - name: 📥 下载桌面端构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: EasySSH-windows-*
          path: desktop-artifacts
          merge-multiple: true

      - name: 📦 准备桌面端 Release 资产
        run: |
          mkdir -p release-assets
          cp desktop-artifacts/*.zip release-assets/

      - name: 🧾 生成更新清单
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          TAG="v${VERSION}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          MANIFEST_URL_BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          WINDOWS_DESKTOP_ZIP="EasySSH-windows-amd64-desktop.zip"
          WINDOWS_DESKTOP_PATH="release-assets/${WINDOWS_DESKTOP_ZIP}"

          if [ ! -f "$WINDOWS_DESKTOP_PATH" ]; then
            echo "::error::Missing desktop asset: $WINDOWS_DESKTOP_PATH"
            exit 1
          fi

          WINDOWS_DESKTOP_SIZE=$(wc -c < "$WINDOWS_DESKTOP_PATH" | tr -d '[:space:]')
          WINDOWS_DESKTOP_SHA256=$(sha256sum "$WINDOWS_DESKTOP_PATH" | awk '{print $1}')
          RELEASE_NOTES_JSON=$(python3 -c 'import json; from pathlib import Path; print(json.dumps(Path("release_notes.md").read_text(encoding="utf-8")))')

          cat > release-assets/release-manifest.json <<EOF
          {
            "version": "${VERSION}",
            "tag": "${TAG}",
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "release_url": "${RELEASE_URL}",
            "notes": ${RELEASE_NOTES_JSON},
            "web": {
              "docker_image": "shanhee/easyssh:${TAG}",
              "docker_compose": "docker compose pull && docker compose up -d",
              "docker_compose_file": "${MANIFEST_URL_BASE}/docker-compose.yml"
            },
            "desktop": {
              "windows-amd64": {
                "filename": "${WINDOWS_DESKTOP_ZIP}",
                "download_url": "${MANIFEST_URL_BASE}/${WINDOWS_DESKTOP_ZIP}",
                "size": ${WINDOWS_DESKTOP_SIZE},
                "sha256": "${WINDOWS_DESKTOP_SHA256}",
                "platform": "windows",
                "arch": "amd64"
              }
            }
          }
          EOF

          python3 -m json.tool release-assets/release-manifest.json > /tmp/release-manifest.json
          mv /tmp/release-manifest.json release-assets/release-manifest.json
          cat release-assets/release-manifest.json

      - name: 🎉 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: false
          files: |
            docker/docker-compose.yml
            .env.example
            release-assets/*.zip
            release-assets/release-manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 生成摘要
        run: |
          echo "## ✅ Release 创建成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**版本:** \`${GITHUB_REF_NAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**查看 Release:** [点击这里](https://github.com/shan-hee/EasySSH/releases/tag/${GITHUB_REF_NAME})" >> $GITHUB_STEP_SUMMARY
