                  $ref: '#/components/schemas/SSHSession'

  /ssh/sessions/{id}:
    delete:
      operationId: deleteSshSessionsId
      tags:
        - ssh
      summary: 关闭 SSH 会话
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 会话已关闭
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  # ========================================
  # 用户实时事件
  # ========================================

    get:
      operationId: getSshSessionsId
      tags: [ssh]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/JSON'
        '400':
          $ref: '#/components/responses/Error'
  /events/stream:
    get:
      operationId: getEventsStream
      tags: [realtime]
      summary: 订阅当前用户的任务与站内通知事件
      description: 使用 Bearer 认证的 SSE 长连接。事件仅作为状态变化提示，客户端收到后应重新获取任务或通知的权威状态。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: SSE 事件流，事件类型包括 task.created、task.updated、notification.created 和 notification.changed
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                id: 92d459d5-3d5d-4e27-8e33-d326f99ebbf4
                event: task.updated
                data: {"id":"92d459d5-3d5d-4e27-8e33-d326f99ebbf4","type":"task.updated","data":{"task_id":"f65f87df-dd77-46e4-9535-24f192a596da"},"created_at":"2026-07-10T12:00:00Z"}

  # ========================================
  # 统一任务中心
  # ========================================
  /tasks:
    get:
      operationId: getTasks
      tags: [tasks]
      summary: 获取当前用户的任务运行记录
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          description: 逗号分隔的任务状态
          schema:
            type: string
            example: queued,running,canceling
        - name: task_type
          in: query
          description: 逗号分隔的任务类型
          schema:
            type: string
            example: command,script,sftp_recursive_delete
        - name: trigger_type
          in: query
          description: 逗号分隔的触发方式
          schema:
            type: string
            example: manual,scheduled
        - name: keyword
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 任务运行记录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskRunListResponse'

  /tasks/cleanup:
    delete:
      operationId: deleteTasksCleanup
      tags: [tasks]
      summary: 清理当前用户保留期外的已结束任务运行记录
      description: 手动按统一保留天数清理终态任务。系统默认每天自动清理一次：成功和已取消任务保留 90 天，失败、部分成功和超时任务保留 180 天；排队中、运行中和取消中的任务永久保留且禁止清理。任务事件、结果日志和关联通知随任务记录一并清理。
      security:
        - bearerAuth: []
      parameters:
        - name: retention_days
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 3650
            default: 90
      responses:
        '200':
          description: 清理结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCleanupResponse'
        '400':
          description: 保留天数无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks/statistics:
