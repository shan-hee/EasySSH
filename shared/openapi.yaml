      summary: 执行脚本
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScriptExecutionRequest'
      responses:
        '200':
          description: 执行已开始
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScriptExecutionResult'

  # ========================================
  # 系统监控
  # ========================================
  /monitoring/servers/{id}/metrics:
    get:
      tags:
        - monitoring
      summary: 获取服务器监控指标
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          description: 开始时间
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: 结束时间
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SystemMetrics'

  # ========================================
  # 日志管理
  # ========================================
  /logs:
    get:
      tags:
        - logs
      summary: 获取日志列表
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 50
        - name: level
          in: query
          schema:
            type: string
            enum: [debug, info, warning, error, critical]
        - name: source
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Log'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  # ========================================
  # 用户管理
  # ========================================
  /users:
    get:
      tags:
        - users
      summary: 获取用户列表
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /users/me:
    get:
      tags:
        - users
      summary: 获取当前用户信息
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/me/notifications:
    put:
      tags: [users, notifications]
      summary: 更新当前用户的通知偏好
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserNotificationSettingsRequest'
      responses:
        '200':
          description: 通知偏好已更新
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string
