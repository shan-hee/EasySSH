      tags:
        - sftp
      summary: 同步删除单个普通文件
      description: 目录删除必须使用 delete-paths，由后端决定快速完成或创建递归任务。
      security:
        - bearerAuth: []
      parameters:
        - name: server_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '409':
          description: 目标是目录，必须改用 delete-paths

  /sftp/{server_id}/delete-paths:
    post:
      tags: [sftp, tasks]
      summary: 快速删除一个或多个 SFTP 路径
      description: 路径必须为绝对路径。接口先建立 SSH 连接并同步执行服务器端 rm；成功时直接返回且不创建任务，连接或认证失败时同步报错，只有连接成功但命令执行失败时才创建 SFTP 递归删除任务。
      security:
        - bearerAuth: []
      parameters:
        - name: server_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SFTPDeletePathsRequest'
      responses:
        '200':
          description: 快速删除已同步完成，mode 为 fast
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SFTPDeletePathsResponse'
        '202':
          description: 快速删除不可用，递归删除任务已进入统一任务中心，mode 为 recursive_task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SFTPDeletePathsResponse'
        '400':
          description: 路径不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '428':
          description: 需要补充服务器凭据或私钥口令
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: SSH 连接或认证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

